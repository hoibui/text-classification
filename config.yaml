training:
  data_path: "${DATA_PATH}"
  test_size: ${TEST_SIZE}
  random_state: ${RANDOM_STATE}
  cross_validation_folds: ${CV_FOLDS}

models:
  traditional:
    vectorizers:
      - name: "tfidf_word"
        type: "TfidfVectorizer"
        params:
          max_features: 10000
          ngram_range: [1, 2]
          stop_words: "english"
      - name: "tfidf_char"
        type: "TfidfVectorizer"
        params:
          max_features: 10000
          analyzer: "char"
          ngram_range: [2, 4]
      - name: "count"
        type: "CountVectorizer"
        params:
          max_features: 10000
          ngram_range: [1, 2]
          stop_words: "english"

    classifiers:
      - name: "logistic"
        type: "LogisticRegression"
        params:
          random_state: 42
          max_iter: 1000
          C: 1.0
      - name: "random_forest"
        type: "RandomForestClassifier"
        params:
          n_estimators: 100
          random_state: 42
          n_jobs: -1
      - name: "gradient_boost"
        type: "GradientBoostingClassifier"
        params:
          n_estimators: 100
          random_state: 42
      - name: "svm"
        type: "SVC"
        params:
          kernel: "rbf"
          random_state: 42
          probability: true
      - name: "naive_bayes"
        type: "MultinomialNB"
        params: {}

  transformer:
    model_name: "distilbert-base-uncased"
    max_length: 128
    batch_size: 16
    epochs: 3
    learning_rate: 2e-5
    warmup_steps: 500
    weight_decay: 0.01

mlops:
  experiment_tracking:
    enabled: true
    backend: "mlflow"
    tracking_uri: "${MLFLOW_TRACKING_URI}"

  model_registry:
    enabled: true
    database:
      host: "${DB_HOST}"
      port: ${DB_PORT}
      database: "${DB_NAME}"
      user: "${DB_USER}"
      password: "${DB_PASSWORD}"

  monitoring:
    enabled: ${MONITORING_ENABLED}
    log_level: "${MONITORING_LOG_LEVEL}"
    metrics_port: ${MONITORING_METRICS_PORT}

  deployment:
    api_port: ${API_PORT}
    workers: ${API_WORKERS}
    host: "${API_HOST}"

logging:
  version: 1
  disable_existing_loggers: false
  formatters:
    standard:
      format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  handlers:
    default:
      level: "INFO"
      formatter: "standard"
      class: "logging.StreamHandler"
      stream: "ext://sys.stdout"
    file:
      level: "${LOG_LEVEL}"
      formatter: "standard"
      class: "logging.FileHandler"
      filename: "${LOG_FILE}"
  loggers:
    "":
      level: "INFO"
      handlers: ["default", "file"]
  root:
    level: "${LOG_LEVEL}"
    handlers: ["default"]